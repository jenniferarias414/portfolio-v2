<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Jenny Arias | Data Engineer</title>
    <script>
      var pathSegmentsToKeep = 1;
      var locationRef = window.location;

      locationRef.replace(
        locationRef.protocol +
          "//" +
          locationRef.hostname +
          (locationRef.port ? ":" + locationRef.port : "") +
          locationRef.pathname
            .split("/")
            .slice(0, 1 + pathSegmentsToKeep)
            .join("/") +
          "/?/" +
          locationRef.pathname
            .slice(1)
            .split("/")
            .slice(pathSegmentsToKeep)
            .join("/")
            .replace(/&/g, "~and~") +
          (locationRef.search ? "&" + locationRef.search.slice(1).replace(/&/g, "~and~") : "") +
          locationRef.hash
      );
    </script>
  </head>
  <body></body>
</html>
